services:
  database:
    image: postgres:16.2-alpine
    container_name: ${DB_HOST}
    ports:
      - "${DB_PORT}:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: espacio-dialogo-backend
    ports:
      - "1337:1337"
    command: ["pnpm", "run", "develop"]
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=development
    volumes:
      - ./backend/config:/opt/app/config
      - ./backend/src:/opt/app/src
      - ./backend/package.json:/opt/app/package.json
      - ./backend/pnpm-workspace.yaml:/opt/app/pnpm-workspace.yaml
      - ./backend/tsconfig.json:/opt/app/tsconfig.json
      - /opt/app/node_modules
      - /opt/app/.strapi
      - /opt/app/.cache
      - /opt/app/dist
      - strapi_uploads:/opt/app/public/uploads
    depends_on:
      database:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: espacio-dialogo-frontend
    ports:
      - "4321:4321"
    env_file:
      - ./frontend/.env
    environment:
      - NODE_ENV=development
    volumes:
      # Protect source layout with Read-Only policies
      - ./frontend/src:/opt/app/src:ro
      - ./frontend/public:/opt/app/public:ro
      - ./frontend/package.json:/opt/app/package.json:ro
      - ./frontend/astro.config.mjs:/opt/app/astro.config.mjs:ro
      - ./frontend/postcss.config.mjs:/opt/app/postcss.config.mjs:ro
      # Isolate ephemeral dependencies and tracking files from host disk
      - /opt/app/node_modules
      - /opt/app/.astro
    networks:
      - app-network

volumes:
  pg_data:
  strapi_uploads:

networks:
  app-network:
    driver: bridge
